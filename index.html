<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>LinguaFlow AI | Intelligent Translator</title>
<!-- ✅ Basic Meta -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ App Title -->
<title>LinguaFlow AI - Smart Translator</title>

<!-- ✅ Description (IMPORTANT for SEO & preview) -->
<meta name="description" content="LinguaFlow AI is a fast and smart language translator supporting 100+ languages. Translate instantly with AI-powered accuracy.">

<!-- ✅ Keywords -->
<meta name="keywords" content="translator, language translator, AI translator, English to Urdu, translate app">

<!-- ✅ Author -->
<meta name="author" content="Rafay Almani">

<!-- ✅ Favicon -->
<link rel="icon" type="image/png" href="favicon.png">

<!-- ✅ Mobile App Feel -->
<meta name="theme-color" content="#f5d76e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
  <!-- Google Fonts & simple icons (Font Awesome) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
   <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container" id="app">
  <!-- MAIN TRANSLATOR SCREEN - Now shown by default -->
  <div id="translatorScreen" class="screen">
    <div class="translator-header">
      <h1>Translator</h1>
      <div class="action-icons">
        <i class="far fa-star" id="favStarBtn"></i>
        <i class="far fa-question-circle" id="infoBtn"></i>
      </div>
    </div>

    <!-- Source Card -->
    <div class="trans-card">
      <div class="lang-bar">
        <div class="lang-pill" id="sourceLangBtn"><span id="sourceLangLabel">Auto-detect</span> <i class="fas fa-chevron-down"></i></div>
        <div class="swap-btn" id="swapLangBtn"><i class="fas fa-arrows-alt-h"></i></div>
      </div>
      <textarea id="sourceText" rows="3" placeholder="Type text to translate..."></textarea>
      <div class="card-footer">
        <i class="far fa-copy" id="copySourceBtn"></i>
        <i class="fas fa-times-circle" id="clearInputBtn"></i>
      </div>
    </div>

    <!-- Target Card -->
    <div class="trans-card">
      <div class="lang-bar">
        <div class="lang-pill" id="targetLangBtn"><span id="targetLangLabel">English</span> <i class="fas fa-chevron-down"></i></div>
        <div><i class="fas fa-volume-up" id="speakOutputBtn" style="cursor:pointer; color:#6b6f8c;"></i></div>
      </div>
      <div class="output-text" id="translatedOutput">Translation will appear here</div>
      <div class="card-footer">
        <i class="far fa-copy" id="copyOutputBtn"></i>
        <i class="fas fa-undo-alt" id="clearOutputBtn"></i>
      </div>
    </div>

    <!-- Action buttons row -->
    <div class="action-buttons">
      <div class="action-btn highlight" id="writeBtn"><i class="fas fa-keyboard"></i><span>Write</span></div>
      <div class="action-btn" id="recordBtn"><i class="fas fa-microphone"></i><span>Record</span></div>
      <div class="action-btn" id="scanBtn"><i class="fas fa-camera"></i><span>Scan</span></div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
      <div class="nav-item" data-nav="home"><i class="fas fa-home"></i><span>Home</span></div>
      <div class="nav-item" data-nav="search"><i class="fas fa-search"></i><span>Search</span></div>
      <div class="nav-item" data-nav="favorites"><i class="fas fa-heart"></i><span>Favorites</span></div>
    </div>
  </div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script src="script.js"></script>
</body>
</html>
